<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warren — Manga & Anime</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0810;
    color: #e0d8f0;
    font-family: Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  #site-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: center;
    padding: 18px;
    background: linear-gradient(to bottom, rgba(10,8,16,0.95), transparent);
  }
  #site-header a {
    font-family: Georgia, serif;
    font-size: 1.1rem;
    letter-spacing: 0.18em;
    color: #b89ad4;
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  #site-header a:hover { color: #e0d8f0; }

  .scene-intro {
    width: 100%;
    height: 55vh;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .scene-intro svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .intro-text {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 0 28px;
  }
  .intro-text h1 {
    font-size: 2.2rem;
    font-weight: normal;
    letter-spacing: 0.1em;
    color: #d0c0e8;
    margin-bottom: 10px;
  }
  .intro-text p {
    font-size: 0.82rem;
    font-style: italic;
    color: #6a5a8a;
    letter-spacing: 0.06em;
  }
  .fog-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 140px;
    background: linear-gradient(to top, rgba(10,8,16,1), transparent);
    pointer-events: none;
    z-index: 5;
  }

  .content-wrap {
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 28px 120px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
    margin-top: 56px;
  }
  .section-header:first-child { margin-top: 0; }
  .section-header h2 {
    font-size: 1rem;
    font-weight: normal;
    letter-spacing: 0.16em;
    color: #b89ad4;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .section-divider {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, rgba(184,154,212,0.3), transparent);
  }

  .media-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }

  .media-card { display: flex; flex-direction: column; gap: 10px; }

  .cover {
    width: 100%;
    aspect-ratio: 2/3;
    background: #14101e;
    border-radius: 3px;
    border: 1px solid rgba(184,154,212,0.1);
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    opacity: 0.5;
    transition: opacity 0.2s, border-color 0.2s;
  }
  .media-card:hover .cover {
    opacity: 1;
    border-color: rgba(184,154,212,0.35);
  }
  .cover img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .media-title { font-size: 0.82rem; color: #c0b0d8; margin-bottom: 3px; }
  .media-sub   { font-size: 0.72rem; color: #5a4a7a; font-style: italic; margin-bottom: 5px; }
  .media-note  { font-size: 0.72rem; color: #7a6a9a; font-style: italic; line-height: 1.6; }

  .breadcrumb {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    color: #4a3a6a;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .breadcrumb a { color: #6a5a8a; text-decoration: none; transition: color 0.2s; }
  .breadcrumb a:hover { color: #b89ad4; }
  .breadcrumb span { margin: 0 6px; }
</style>
</head>

    </g>
    <!-- Central glow orb -->
    <circle cx="400" cy="200" r="60" fill="#2a0a45" opacity="0.4"/>
    <circle cx="400" cy="200" r="35" fill="#3a1055" opacity="0.5"/>
    <circle cx="400" cy="200" r="15" fill="#5a1a7a" opacity="0.6"/>
    <circle cx="400" cy="200" r="5"  fill="#8a3aaa" opacity="0.8"/>
    <!-- Horizon -->
    <rect x="0" y="370" width="800" height="30" fill="#070510"/>
  </svg>
  <div class="fog-bottom"></div>
