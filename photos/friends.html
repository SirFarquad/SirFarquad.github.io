<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warren — Friends</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e0c0a;
    color: #e0d8cc;
    font-family: Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  #site-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: center;
    padding: 18px;
    background: linear-gradient(to bottom, rgba(14,12,10,0.95), transparent);
  }
  #site-header a {
    font-family: Georgia, serif;
    font-size: 1.1rem;
    letter-spacing: 0.18em;
    color: #c4a96e;
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  #site-header a:hover { color: #e0d8cc; }

  .scene-intro {
    width: 100%;
    height: 60vh;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .scene-intro svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .intro-text {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 0 28px;
  }
  .intro-text h1 {
    font-size: 2.2rem;
    font-weight: normal;
    letter-spacing: 0.1em;
    color: #e0d0b0;
    margin-bottom: 10px;
  }
  .intro-text p {
    font-size: 0.82rem;
    font-style: italic;
    color: #8a7a5a;
    letter-spacing: 0.06em;
  }
  .fog-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 140px;
    background: linear-gradient(to top, rgba(14,12,10,1), transparent);
    pointer-events: none;
    z-index: 5;
  }

  .gallery-wrap {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px 24px 120px;
  }

  /* Masonry-ish varied grid for a candid, spontaneous feel */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .photo-grid .span-2 { grid-column: span 2; }
  .photo-grid .tall   { grid-row: span 2; aspect-ratio: 1/2 !important; }

  .photo-slot {
    position: relative;
    background: #141210;
    border: 1px dashed rgba(200,169,110,0.12);
    border-radius: 3px;
    overflow: hidden;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    transition: border-color 0.2s;
    cursor: default;
  }
  .photo-slot.span-2 { aspect-ratio: 2/1; }
  .photo-slot:hover  { border-color: rgba(200,169,110,0.28); }
  .photo-slot img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
  }
  .photo-slot:hover img { transform: scale(1.03); }
  .placeholder-icon { font-size: 1.3rem; opacity: 0.3; }
  .placeholder-text { font-size: 0.68rem; font-style: italic; color: #5a4a2a; letter-spacing: 0.06em; }

  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 200;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 2px; }
  .lightbox-close {
    position: absolute;
    top: 24px; right: 32px;
    color: #e0d8cc;
    font-size: 1.8rem;
    cursor: pointer;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .lightbox-close:hover { opacity: 1; }

  .breadcrumb {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    color: #5a4a2a;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .breadcrumb a { color: #7a6a4a; text-decoration: none; transition: color 0.2s; }
  .breadcrumb a:hover { color: #c4a96e; }
  .breadcrumb span { margin: 0 6px; }
</style>
</head>
<body>

<header id="site-header">
  <a href="../../index.html">Warren</a>

  </svg>

  <div class="intro-text">
    <h1>Friends</h1>
    <p>Moments &amp; memories with the people I love</p>
  </div>
</section>

<nav class="breadcrumb">

<script>
  function openLightbox(el) {
    const img = el.querySelector('img');
    if (!img) return;
    document.getElementById('lightbox-img').src = img.src;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightbox-img').src = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
</script>
